config vpn ipsec phase1-interface
    edit "CERT-VPN"
        set type dynamic
        set interface "port1"
        set ike-version 2
        set keylife 28800
        set authmethod signature
        set net-device disable
        set mode-cfg enable
        set ipv4-dns-server1 192.168.1.240
        set proposal aes256gcm-prfsha512
        set dhgrp 21
        set client-resume enable
        set client-resume-interval 300
        set transport auto
        set certificate "fgt-vpncert"
        set peer "EMS-SUBCA"
        set ipv4-start-ip 172.16.100.1
        set ipv4-end-ip 172.16.100.20
        set ipv4-split-include "BASE-RFC1918-192"
    next
end
config vpn ipsec phase2-interface
    edit "CERT-VPN"
        set phase1name "CERT-VPN"
        set proposal aes256-sha256
        set dhgrp 21
        set keepalive enable
        set keylifeseconds 3600
    next
end
config firewall policy
    edit 0
        set name "CERT-VPN"
        set srcintf "CERT-VPN"
        set dstintf "LAN"
        set action accept
        set srcaddr "all"
        set dstaddr "all"
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set nat enable
    next
end

config switch-controller security-policy 802-1X
    edit "LAB-FAC-802.1x"
        set security-mode 802.1X-mac-based
        set user-group "FAC-RADIUS"
    next
    edit "LAB-GUEST-802.1X"
        set security-mode 802.1X-mac-based
        set user-group "FAC-RADIUS"
        set mac-auth-bypass enable
        set guest-vlan enable
        set guest-vlan-id "GUESTS"
        set guest-auth-delay 10
    next
end
config switch-controller managed-switch
    edit "S424ENTFSERIAL"
        config ports
            edit "port1"
            edit "port2"
                set vlan "CLIENTS"
                set port-security-policy "LAB-FAC-802.1x"
            next
		end
	next
end

config wireless-controller vap
    edit "LAB"
        set ssid "LAB"
        set security wpa2-only-enterprise
        set auth radius
        set radius-server "FAC"
        set schedule "always"
    next
end

config firewall ssl-ssh-profile
    edit "BASE-DPI-SSL-SSH-PROFILE"
        set comment "FORTIGATE BASELINE FROM https://guenay.at"
        config ssl
            set unsupported-ssl-cipher block
            set unsupported-ssl-negotiation block
        end
        config https
            set ports 443
            set status deep-inspection
            set quic inspect
            set unsupported-ssl-cipher block
            set unsupported-ssl-negotiation block
            set min-allowed-ssl-version tls-1.2
        end
        config ftps
            set ports 990
            set status deep-inspection
            set unsupported-ssl-cipher block
            set unsupported-ssl-negotiation block
            set min-allowed-ssl-version tls-1.2
        end
        config imaps
            set ports 993
            set status deep-inspection
            set unsupported-ssl-cipher block
            set unsupported-ssl-negotiation block
        end
        config pop3s
            set ports 995
            set status deep-inspection
            set unsupported-ssl-cipher block
            set unsupported-ssl-negotiation block
        end
        config smtps
            set ports 465
            set status deep-inspection
            set unsupported-ssl-cipher block
            set unsupported-ssl-negotiation block
        end
        config ssh
            set ports 22
            set status disable
            set unsupported-version block
        end
        config dot
            set status deep-inspection
            set quic inspect
            set unsupported-ssl-cipher block
            set unsupported-ssl-negotiation block
        end
        set caname "FGT_SUBCA"
    next
end